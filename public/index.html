<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchAssistant</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-inter"
  >
    <div
      class="chat-container bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden"
    >
      <h1
        class="text-center text-2xl font-bold p-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-t-lg"
      >
        🤖 ArchAssistant
      </h1>

      <div
        id="messages"
        class="messages flex-grow p-4 overflow-y-auto space-y-3"
      >
        <!-- Mensajes del chat -->
      </div>

      <!-- Loader-->
      <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="message assistant-message">
          <span class="loading-text">Cargando</span
          ><span class="dot dot1">.</span><span class="dot dot2">.</span
          ><span class="dot dot3">.</span>
        </div>
      </div>

      <div class="input-area flex p-4 border-t border-gray-200 bg-gray-50">
        <input
          type="text"
          id="userInput"
          placeholder="Escribe tu pregunta sobre arquitectura..."
          class="flex-grow p-3 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          id="sendButton"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-r-lg shadow-md transition-colors duration-200"
        >
          Enviar
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
